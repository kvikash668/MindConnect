name: MindConnect CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # updated

      - name: Setup Node.js
        uses: actions/setup-node@v4      # updated
        with:
          node-version: '20'             # upgraded 18→20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present
        continue-on-error: true

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth-service, user-service, social-service, payment-service, api-gateway]

    steps:
      - uses: actions/checkout@v4        # updated

      - name: Login to ACR
        uses: azure/docker-login@v2      # v1→v2 fixes Node.js warning
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE=${{ env.REGISTRY }}/mindconnect/${{ matrix.service }}
          docker build \
            -f docker/${{ matrix.service }}.Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Done
        run: echo "Pushed ${{ matrix.service }}:${{ github.sha }}"
